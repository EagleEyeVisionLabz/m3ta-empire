name: openrouter
seed: 0
output_dir: ../results

# Requires OPENROUTER_API_KEY in the environment.
# Swap `model` to whichever candidate you're evaluating, e.g.:
#   x-ai/grok-code-fast-1
#   anthropic/claude-haiku
#   qwen/qwen3-coder
backend:
  kind: openrouter
  params:
    model: x-ai/grok-code-fast-1
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.2
    http_referer: https://github.com/EagleEyeVisionLabz/m3ta-empire
    x_title: m3ta-empire-eval-harness

tasks:
  - kind: vision-to-code
    fixtures: ../fixtures/vision
    params:
      reasoning: medium
      max_tokens: 4096
      timeout_s: 90

  - kind: refactor
    fixtures: ../fixtures/refactor
    params:
      reasoning: medium
      max_tokens: 8192
      timeout_s: 120
      run_tests: true

  - kind: long-context
    fixtures: ../fixtures/long_context
    params:
      reasoning: low
      max_tokens: 512
      timeout_s: 90

  - kind: reliability
    fixtures: ../fixtures/reliability
    params:
      runs_per_task: 3
      min_success_rate: 0.7
      reasoning: medium
      max_tokens: 6000
      timeout_s: 90
